<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Advice & Jokes API</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Random Advice & Jokes</h1>

    <section class="card">
      <h2>API Actions</h2>

    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
